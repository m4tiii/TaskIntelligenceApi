spring:
  security:
    user:
      name: user
      password: pass
  application:
    name: Task Intelligence Api

  datasource:
    url: jdbc:postgresql://localhost:5432/TaskIntelligenceApiDB
    username: postgres
    password: pass
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  threads:
    virtual:
      enabled: true